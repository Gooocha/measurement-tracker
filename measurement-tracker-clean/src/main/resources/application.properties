spring.application.name=measurement-tracker-clean
spring.datasource.url=jdbc:postgresql://localhost:5432/measurement_tracker_clean
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=uploads
app.upload.max-file-size-bytes=5242880
app.upload.allowed-content-types=image/png,image/jpeg,image/jpg
app.tesseract.path=tesseract
app.ocr.scheduler-delay-ms=3000
app.jwt.secret=01234567890123456789012345678901
